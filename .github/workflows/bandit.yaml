name: Secret Scan

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  trufflehog:
    name: TruffleHog secret scan
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: TruffleHog scan
        uses: trufflesecurity/trufflehog@v3.95.5
        with:
          extra_args: --only-verified
