name: BATS Tests

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  test:
    name: Run BATS tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    container:
      image: archlinux/archlinux:latest

    steps:
      - name: Install dependencies
        run: pacman --noconfirm -Syu --needed git bats shellcheck

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run BATS tests
        run: bats tests/
