name: ShellCheck

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  shellcheck:
    name: ShellCheck lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install ShellCheck
        run: sudo apt-get install -y shellcheck

      - name: Syntax check all scripts
        run: |
          for f in arch-install.sh bootstrap.sh setup.sh lib/*.sh; do
            echo "Checking syntax: $f"
            bash -n "$f"
          done

      - name: ShellCheck all scripts
        run: |
          shellcheck --severity=warning arch-install.sh bootstrap.sh setup.sh lib/*.sh
