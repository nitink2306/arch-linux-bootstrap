name: CI

on:
  pull_request:
    branches:
      - main

jobs:
  lint:
    name: Lint and validate bash scripts
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install ShellCheck
        run: sudo apt-get install -y shellcheck

      - name: Syntax check — arch-install.sh
        run: bash -n arch-install.sh

      - name: Syntax check — setup.sh
        run: bash -n setup.sh

      - name: ShellCheck — arch-install.sh
        run: shellcheck --severity=warning arch-install.sh

      - name: ShellCheck — setup.sh
        run: shellcheck --severity=warning setup.sh
